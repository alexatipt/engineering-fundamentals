name: Build and Publish Docker Image

on:
  pull_request:
    types: [closed]

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: containerregstrywua.azurecr.io
          username: ContainerRegstryWUA
          password: ${{ secrets.AZURE_SECRET }}

      - name: Generate version tag
        id: version
        run: echo "VERSION=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_SECRET }}/myapp:${{ steps.version.outputs.VERSION }}
            ${{ secrets.AZURE_SECRET }}/myapp:latest